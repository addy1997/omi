services:
  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
    ports: ["9000:9000"]
    environment:
      - PLATFORM_DB_URL=postgresql+psycopg://omi:omi@db:5432/omi
    depends_on:
      db: { condition: service_healthy }

  helix:
    build:
      context: .
      dockerfile: agents/helix/Dockerfile
    ports: ["8000:8000"]
    environment:
      - PLATFORM_URL=http://platform:9000
    env_file: agents/helix/.env
    depends_on: [platform]

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: omi
      POSTGRES_PASSWORD: omi
      POSTGRES_DB: omi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omi"]
      interval: 5s
      retries: 10

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes: ["./dashboard:/app"]
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["5173:5173"]
    environment:
      - VITE_PLATFORM_URL=http://localhost:9000
