<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2535"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="320" height="100" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="318" height="98" rx="15" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Icon: central node + 5 orbiting agent dots -->
  <!-- Connecting lines -->
  <line x1="50" y1="50" x2="26" y2="24" stroke="url(#accent)" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="74" y2="24" stroke="url(#accent)" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="18" y2="54" stroke="url(#accent)" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="82" y2="54" stroke="url(#accent)" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="50" y2="80" stroke="url(#accent)" stroke-width="1.2" opacity="0.5"/>

  <!-- Outer agent nodes -->
  <circle cx="26"  cy="24" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="74"  cy="24" r="5" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="18"  cy="54" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="82"  cy="54" r="5" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="50"  cy="80" r="5" fill="#6366f1" opacity="0.9"/>

  <!-- Central hub -->
  <circle cx="50" cy="50" r="14" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="10" fill="url(#accent)"/>
  <text x="50" y="54.5" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="10" font-weight="700" fill="#ffffff">⬡</text>

  <!-- Wordmark -->
  <text x="112" y="45" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif"
        font-size="32" font-weight="800" letter-spacing="-1.5"
        fill="url(#accent)" filter="url(#shadow)">omi</text>

  <!-- Tagline -->
  <text x="113" y="66" font-family="'SF Pro Text', 'Inter', 'Segoe UI', sans-serif"
        font-size="11.5" font-weight="400" letter-spacing="0.5"
        fill="#94a3b8">multi-agent platform</text>

  <!-- Separator line -->
  <line x1="104" y1="24" x2="104" y2="76" stroke="#1e2535" stroke-width="1.5"/>
</svg>
