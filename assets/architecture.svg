<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <style>
      .layer-label { font-size: 14px; font-weight: 600; fill: #1e1e1e; }
      .box-label { font-size: 15px; font-weight: 600; fill: #1e1e1e; text-anchor: middle; }
      .sub-label { font-size: 13px; fill: #1e1e1e; text-anchor: middle; }
      .arrow-label { font-size: 12px; fill: #757575; text-anchor: middle; }
      .note { font-size: 11px; fill: #757575; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background zones -->
  <rect x="10" y="20" width="880" height="140" rx="8" fill="#dbe4ff" opacity="0.25" stroke="#4a9eed" stroke-width="1"/>
  <rect x="10" y="200" width="880" height="180" rx="8" fill="#e5dbff" opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="10" y="420" width="880" height="150" rx="8" fill="#d3f9d8" opacity="0.25" stroke="#22c55e" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="25" y="45" class="layer-label">Client Layer</text>
  <text x="25" y="225" class="layer-label">Platform Layer</text>
  <text x="25" y="445" class="layer-label">Agent Layer</text>

  <!-- Client: Dashboard -->
  <rect x="250" y="55" width="400" height="100" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="450" y="95" class="box-label">React Dashboard (5173)</text>
  <text x="450" y="120" class="sub-label">Chat • Agents • Tasks • Metrics</text>

  <!-- Platform: Main API -->
  <rect x="250" y="230" width="400" height="60" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="450" y="265" class="box-label">Omi Platform API (9000)</text>

  <!-- Platform: Components -->
  <rect x="80" y="330" width="160" height="50" rx="6" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="160" y="360" class="box-label">Task Router</text>

  <rect x="280" y="330" width="160" height="50" rx="6" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="360" y="360" class="box-label">Agent Registry</text>

  <rect x="480" y="330" width="160" height="50" rx="6" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="560" y="360" class="box-label">Storage</text>

  <rect x="680" y="330" width="160" height="50" rx="6" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="760" y="360" class="box-label">Observability</text>

  <!-- Arrows from Dashboard to API -->
  <line x1="450" y1="155" x2="450" y2="230" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arrowhead-blue)"/>
  <text x="460" y="195" class="arrow-label">HTTP + WebSocket</text>

  <!-- Arrows from API components to Agents -->
  <line x1="160" y1="290" x2="115" y2="380" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowhead-purple)"/>
  <line x1="360" y1="290" x2="230" y2="380" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowhead-purple)"/>
  <line x1="560" y1="290" x2="360" y2="380" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowhead-purple)"/>
  <line x1="760" y1="290" x2="610" y2="380" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowhead-purple)"/>

  <!-- Agents -->
  <!-- Helix -->
  <rect x="40" y="470" width="130" height="110" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="105" y="505" class="box-label">Helix</text>
  <text x="105" y="528" class="sub-label">Coder</text>
  <text x="105" y="551" class="sub-label">(8000)</text>

  <!-- Explorer -->
  <rect x="200" y="470" width="130" height="110" rx="8" fill="#c3fae8" stroke="#22c55e" stroke-width="2"/>
  <text x="265" y="505" class="box-label">Explorer</text>
  <text x="265" y="528" class="sub-label">Reader</text>

  <!-- Planner -->
  <rect x="360" y="470" width="130" height="110" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="425" y="505" class="box-label">Planner</text>
  <text x="425" y="528" class="sub-label">Issues</text>

  <!-- Researcher -->
  <rect x="520" y="470" width="130" height="110" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="585" y="505" class="box-label">Researcher</text>
  <text x="585" y="528" class="sub-label">Web Search</text>

  <!-- Triager -->
  <rect x="680" y="470" width="130" height="110" rx="8" fill="#eebefa" stroke="#ec4899" stroke-width="2"/>
  <text x="745" y="505" class="box-label">Triager</text>
  <text x="745" y="528" class="sub-label">Labels</text>

  <!-- Arrows to agents -->
  <line x1="115" y1="420" x2="105" y2="470" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <line x1="230" y1="420" x2="265" y2="470" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="360" y1="420" x2="425" y2="470" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <line x1="520" y1="420" x2="585" y2="470" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <line x1="680" y1="420" x2="745" y2="470" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowhead-pink)"/>

  <!-- Notes -->
  <text x="450" y="410" class="arrow-label">Keyword + LLM routing</text>
  <text x="450" y="615" class="note">🔒 Git worktree isolation • Docker sandbox • Read-only access controls</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a9eed"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowhead-pink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ec4899"/>
    </marker>
  </defs>
</svg>
